name: CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Remote Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 206.189.4.226
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /opt/doni-doni-backend
            git pull origin main
            docker compose down
            docker compose up -d --build
