services:

  postgres-keycloak:
    image: postgres:17-alpine
    container_name: doni-doni-postgres-keycloak
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - postgres-keycloak-data:/var/lib/postgresql/data
    ports:
      - "5434:5432" # Exposed on 5434 instead of 5432 to avoid conflict with local postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-app:
    image: postgres:17-alpine
    container_name: doni-doni-postgres-app
    environment:
      POSTGRES_DB: donidoni
      POSTGRES_USER: donidoni
      POSTGRES_PASSWORD: donidoni
    volumes:
      - postgres-app-data:/var/lib/postgresql/data
    ports:
      - "5433:5432" # Exposed on 5433 to avoid conflict with Keycloak DB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U donidoni"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: doni-doni-keycloak
    command: start-dev --features=token-exchange
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-keycloak:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "${KEYCLOAK_PORT:-8080}:8080"
    depends_on:
      postgres-keycloak:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: doni-doni-redis
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  minio:
    image: minio/minio:latest
    container_name: doni-doni-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  doni-doni-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: doni-doni-api
    environment:
      SPRING_PROFILES_ACTIVE: dev
      KEYCLOAK_SERVER_URL: http://keycloak:8080
      KEYCLOAK_REALM: doni-doni
      KEYCLOAK_CLIENT_ID: doni-doni-backend
      KEYCLOAK_CLIENT_SECRET: change-me-in-production
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-app:5432/donidoni
      SPRING_DATASOURCE_USERNAME: donidoni
      SPRING_DATASOURCE_PASSWORD: donidoni
      MINIO_URL: http://minio:9000
    ports:
      - "${API_PORT:-8081}:8081"
    restart: on-failure
    depends_on:
      keycloak:
        condition: service_started
      redis:
        condition: service_healthy
      postgres-app:
        condition: service_healthy
      minio:
        condition: service_started

volumes:
  postgres-keycloak-data:
  postgres-app-data:
  minio-data:
